<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ITRC · Oficinas y Recepción · ¿Dónde va este residuo?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2b22;
    --paper:#f1efe4;
    --paper-card:#fbfaf4;
    --line:#d8d4c2;
    --bin-white:#fbfbf7;
    --bin-white-ring:#1c2b22;
    --bin-black:#20231f;
    --bin-black-ring:#e8b339;
    --bin-green:#2f6b3f;
    --bin-green-ring:#8fd18c;
    --accent:#e8b339;
    --alert:#a8412f;
    --alert-soft:#f3ddd3;
    --radius:14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .app{
    max-width:480px;
    margin:0 auto;
    padding:28px 18px 56px;
  }

  @media (min-width:600px){
    .app{max-width:560px; padding:40px 24px 64px;}
  }

  /* ---------- Header ---------- */
  .hero{
    margin-bottom:24px;
    animation:fadeUp .5s ease both;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--bin-green);
    margin:0 0 10px;
  }
  .hero h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(28px,7vw,36px);
    line-height:1.08;
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }
  .hero p{
    margin:0;
    font-size:15px;
    line-height:1.5;
    color:#43503f;
    max-width:38ch;
  }

  /* ---------- Finder ---------- */
  .finder{margin-bottom:14px;}
  #search{
    width:100%;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:16px;
    padding:13px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:var(--paper-card);
    color:var(--ink);
    margin-bottom:10px;
  }
  #search:focus{
    outline:none;
    border-color:var(--bin-green);
    box-shadow:0 0 0 3px rgba(47,107,63,.15);
  }
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.02em;
    text-transform:uppercase;
    padding:7px 11px;
    border-radius:20px;
    border:1px solid var(--line);
    background:transparent;
    color:#4a5544;
    cursor:pointer;
    transition:background .2s, color .2s, border-color .2s;
  }
  .chip:hover{border-color:var(--bin-green);}
  .chip.is-on{
    background:var(--bin-green);
    border-color:var(--bin-green);
    color:#fff;
  }

  /* ---------- Results grid ---------- */
  .results{
    margin-top:8px;
    padding-top:14px;
    border-top:1px solid var(--line);
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  @media (min-width:520px){
    .results{grid-template-columns:repeat(3,1fr);}
  }
  .row{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:7px;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 8px 13px;
    cursor:pointer;
    font-family:'IBM Plex Sans', sans-serif;
    min-height:104px;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .row:hover, .row:focus-visible{
    transform:translateY(-2px);
    border-color:var(--bin-green);
    box-shadow:0 6px 14px -8px rgba(0,0,0,.2);
  }
  .row:focus-visible{outline:2px solid var(--bin-green); outline-offset:2px;}
  .row__icon{font-size:27px; line-height:1;}
  .row__name{
    font-size:12.5px;
    line-height:1.32;
    color:var(--ink);
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .row__cat{
    font-family:'IBM Plex Mono', monospace;
    font-size:9px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:#8b9282;
  }
  .empty{
    grid-column:1 / -1;
    padding:28px 4px;
    text-align:center;
    color:#6b7563;
    font-size:14px;
    line-height:1.5;
  }

  /* ---------- Result detail ---------- */
  .result{
    margin-top:18px;
    padding:20px;
    border-radius:var(--radius);
    border-left:5px solid var(--ink);
    background:var(--paper-card);
    animation:fadeUp .35s ease both;
  }
  .result__icon{
    font-size:34px;
    line-height:1;
    display:block;
    margin-bottom:8px;
  }
  .result__tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin:0 0 8px;
    color:#4a5544;
  }
  .result__tag strong{color:var(--ink);}
  .result__name{
    font-family:'Space Grotesk', sans-serif;
    font-size:21px;
    margin:0 0 10px;
    line-height:1.2;
  }
  .result__tip{font-size:14.5px; line-height:1.55; margin:0 0 16px; color:#3a4536;}
  .reset-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:10px 16px;
    border-radius:8px;
    border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .reset-btn:hover{background:var(--ink); color:#fff;}

  .result--blanca{border-left-color:var(--bin-white-ring);}
  .result--negra{border-left-color:var(--bin-black);}
  .result--verde{border-left-color:var(--bin-green);}
  .result--especial{border-left-color:var(--alert); background:var(--alert-soft);}
  .result--especial .result__tag, .result--especial .result__tag strong{color:var(--alert);}
  .result--especial .result__tip{color:#5c2c20;}
  .result--especial .reset-btn{border-color:var(--alert); color:var(--alert);}
  .result--especial .reset-btn:hover{background:var(--alert); color:#fff;}

  /* ---------- Footer ---------- */
  footer{
    margin-top:34px;
    padding-top:16px;
    border-top:1px solid var(--line);
    font-size:12.5px;
    line-height:1.5;
    color:#74806c;
  }

  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="hero">
    <p class="eyebrow">Agencia ITRC · Oficinas y Recepción</p>
    <h1>¿Qué vas a botar?</h1>
    <p>Escribe el residuo o tócalo en la lista. Te decimos al instante en qué caneca va y por qué.</p>
  </header>

  <section class="finder">
    <label for="search" class="sr-only">Buscar residuo</label>
    <input id="search" type="text" placeholder="Ej: vaso plástico, papel higiénico, cáscara…" autocomplete="off" />
    <div class="chips" id="chips"></div>
  </section>

  <section class="results" id="results"></section>

  <div id="resultDetail" aria-live="polite"></div>

  <footer>
    ¿No encuentras tu residuo o tienes dudas? Pregúntale al equipo de gestión ambiental de la Agencia ITRC.
  </footer>
</div>

<script>
const CAT_LABELS = {
  papel: 'Papel y cartón',
  plastico: 'Plástico',
  vidrio_metal: 'Vidrio y metal',
  organico: 'Orgánicos y comida',
  higiene: 'Higiene y aseo',
  especial: 'Especiales y peligrosos'
};
const CAT_ORDER = ['papel','plastico','vidrio_metal','organico','higiene','especial'];

const BIN_LABEL = {
  blanca: 'BLANCA · APROVECHABLES',
  negra: 'NEGRA · NO APROVECHABLES',
  verde: 'VERDE · ORGÁNICOS'
};

const RESIDUOS = [
  {id:'papel-oficina', name:'Papel de oficina y hojas impresas', icon:'📄', keywords:['papel','hoja','impresion','oficina'], category:'papel', bin:'blanca', tip:'Va en la blanca: dóblalo o apílalo sin arrugar para que se conserve seco y limpio.'},
  {id:'carton', name:'Cajas y cartón', icon:'📦', keywords:['carton','caja','empaque'], category:'papel', bin:'blanca', tip:'Va en la blanca: aplánalas para que ocupen menos espacio y retira cinta o icopor si tienen.'},
  {id:'periodico', name:'Periódico y revistas', icon:'📰', keywords:['periodico','revista','diario'], category:'papel', bin:'blanca', tip:'Va en la blanca: mantenlo seco, el papel mojado pierde valor de reciclaje.'},
  {id:'botella-pet', name:'Botella plástica (PET) vacía', icon:'🧴', keywords:['botella','pet','plastico','gaseosa','agua'], category:'plastico', bin:'blanca', tip:'Va en la blanca: vacíala, enjuágala si tuvo líquido y, si puedes, aplástala.'},
  {id:'vaso-plastico-limpio', name:'Vaso o plato plástico limpio', icon:'🥤', keywords:['vaso','plato','plastico','desechable','limpio'], category:'plastico', bin:'blanca', tip:'Va en la blanca solo si está limpio y seco; con restos de comida va en la negra.'},
  {id:'bolsa-plastica-limpia', name:'Bolsa plástica limpia y seca', icon:'🛍️', keywords:['bolsa','plastico'], category:'plastico', bin:'blanca', tip:'Va en la blanca: agrúpalas dentro de otra bolsa para que no se dispersen.'},
  {id:'tetrapak', name:'Envase de tetrapak (leche, jugo)', icon:'🧃', keywords:['tetrapak','caja leche','jugo','carton laminado'], category:'plastico', bin:'blanca', tip:'Va en la blanca: enjuágalo y aplánalo antes de botarlo.'},
  {id:'tapas-plasticas', name:'Tapas plásticas', icon:'🔘', keywords:['tapa','tapas','plastico'], category:'plastico', bin:'blanca', tip:'Va en la blanca: sepáralas de la botella si puedes, así se reciclan mejor.'},
  {id:'vaso-sucio', name:'Vaso o plato desechable con restos de comida', icon:'🥡', keywords:['vaso','plato','sucio','comida'], category:'plastico', bin:'negra', tip:'Va en la negra: los restos de comida contaminan el plástico y dañan el reciclaje de todo el lote.'},
  {id:'icopor', name:'Icopor / poliestireno expandido', icon:'⬜', keywords:['icopor','espuma','poliestireno'], category:'plastico', bin:'negra', tip:'Va en la negra: en la mayoría de plantas de reciclaje de la ciudad no se procesa.'},
  {id:'papel-metalizado', name:'Envoltura metalizada (dulces, snacks)', icon:'🍬', keywords:['envoltura','dulce','snack','metalizado'], category:'plastico', bin:'negra', tip:'Va en la negra: mezcla materiales que no se pueden separar para reciclar.'},
  {id:'vaso-carton-cafe', name:'Vaso de cartón plastificado (café)', icon:'☕', keywords:['vaso','cafe','tinto','carton','plastificado'], category:'plastico', bin:'negra', tip:'Va en la negra: aunque parece de cartón, tiene una capa de plástico pegada al papel que no se puede separar en el reciclaje.'},
];

const presentCats = CAT_ORDER.filter(id => RESIDUOS.some(item => item.category === id));
const CATS = [{id:'todos', label:'Todos'}, ...presentCats.map(id => ({id, label:CAT_LABELS[id]}))];
const CAT_LABEL = Object.fromEntries(CATS.map(c => [c.id, c.label]));

function normalize(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

let activeCat = 'todos';

const chipsEl = document.getElementById('chips');
const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');
const detailEl = document.getElementById('resultDetail');

CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (cat.id === 'todos' ? ' is-on' : '');
  btn.textContent = cat.label;
  btn.dataset.cat = cat.id;
  btn.addEventListener('click', () => {
    activeCat = cat.id;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('is-on', c.dataset.cat === cat.id));
    renderList();
  });
  chipsEl.appendChild(btn);
});

function renderList(){
  const q = normalize(searchEl.value.trim());
  const filtered = RESIDUOS.filter(item => {
    const matchesCat = activeCat === 'todos' || item.category === activeCat;
    if(!matchesCat) return false;
    if(!q) return true;
    const haystack = normalize(item.name + ' ' + item.keywords.join(' '));
    return haystack.includes(q);
  }).sort((a,b) => a.name.localeCompare(b.name, 'es'));

  resultsEl.innerHTML = '';

  if(filtered.length === 0){
    const empty = document.createElement('p');
    empty.className = 'empty';
    empty.textContent = 'No encontramos ese residuo. Prueba con otra palabra o pregúntale a gestión ambiental.';
    resultsEl.appendChild(empty);
    return;
  }

  filtered.forEach(item => {
    const row = document.createElement('button');
    row.className = 'row';
    row.innerHTML = `<span class="row__icon" aria-hidden="true">${item.icon}</span><span class="row__name">${item.name}</span><span class="row__cat">${CAT_LABEL[item.category]}</span>`;
    row.addEventListener('click', () => selectItem(item));
    resultsEl.appendChild(row);
  });
}

function selectItem(item){
  let html = '';
  if(item.bin === 'especial'){
    html = `
      <div class="result result--especial" tabindex="-1">
        <span class="result__icon" aria-hidden="true">${item.icon}</span>
        <p class="result__tag">NO VA EN LAS CANECAS DE COLOR</p>
        <h2 class="result__name">${item.name}</h2>
        <p class="result__tip">${item.tip}</p>
        <button class="reset-btn" id="resetBtn">Elegir otro residuo</button>
      </div>`;
  } else {
    html = `
      <div class="result result--${item.bin}" tabindex="-1">
        <span class="result__icon" aria-hidden="true">${item.icon}</span>
        <p class="result__tag">VA EN LA CANECA <strong>${BIN_LABEL[item.bin]}</strong></p>
        <h2 class="result__name">${item.name}</h2>
        <p class="result__tip">${item.tip}</p>
        <button class="reset-btn" id="resetBtn">Elegir otro residuo</button>
      </div>`;
  }
  detailEl.innerHTML = html;

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  detailEl.scrollIntoView({behavior: prefersReduced ? 'auto' : 'smooth', block:'center'});
  document.getElementById('resetBtn').addEventListener('click', resetAll);
}

function resetAll(){
  searchEl.value = '';
  activeCat = 'todos';
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('is-on', c.dataset.cat === 'todos'));
  detailEl.innerHTML = '';
  renderList();
  searchEl.focus();
}

searchEl.addEventListener('input', renderList);
renderList();
</script>
</body>
</html>
